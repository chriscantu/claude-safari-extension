name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: --allowedTools "Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh api:*)"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this PR against the three areas defined in CLAUDE.md:

            1. Safari Extension Best Practices
               - Event listener lifecycle: Promises that register browser event listeners must
                 clean up on ALL exit paths (resolve, reject, timeout). Check for settled guards.
               - Cancellable promises: Promises owning external resources must expose .cancel()
                 and callers must invoke it when abandoning early.
               - browser.tabs.onRemoved: Navigation must listen for tab closure and reject
                 immediately rather than waiting for the 30s timeout.
               - BFCache: goBack()/goForward() may complete without a "loading" event in Safari.
                 Do not require "loading" before accepting "complete" for history navigations.
               - Manifest load order: background.scripts order in manifest.json must match
                 the load-order comment in background.js.

            2. STRUCTURE.md Compliance
               - Tool handlers: one file per MCP tool in tools/, named in kebab-case.
               - Tests: JS tests in Tests/JS/ named <source-file>.test.js.
               - Specs: one file per feature in Specs/, named NNN-description.md.
               - No new files outside the canonical layout without documented justification.

            3. DRY / SOLID
               - Tab resolution must use globalThis.resolveTab from tabs-manager.js.
               - Tool registration must use globalThis.registerTool from tool-registry.js.
               - Each tool file implements exactly one MCP tool.
               - Shared logic extracted only when genuinely used by 2+ tools.

            Flag only real issues. Skip style nits. For each finding, cite the specific
            file and line number and explain the impact.

            Use `gh pr comment --repo REPO -R REPO --body "..."` for a top-level review summary.

            For inline code comments, use the GitHub REST API via gh:
              gh api repos/REPO/pulls/PR_NUMBER/comments \
                -f commit_id=COMMIT_SHA \
                -f path="path/to/file.js" \
                -f line=42 \
                -f side=RIGHT \
                -f body="Your comment here"
            Get the commit SHA with: gh pr view PR_NUMBER --repo REPO --json headRefOid -q .headRefOid

  silent-failures:
    runs-on: ubuntu-latest
    env:
      PR_REPO: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: --allowedTools "Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh api:*)"
          prompt: |
            REPO: $PR_REPO
            PR NUMBER: $PR_NUMBER

            Scan this PR diff for silent failure patterns only. Do not review for style,
            structure, or general correctness — focus exclusively on error handling.

            Look for:
            - catch blocks that swallow exceptions without logging or re-throwing
            - Promise rejections that are not handled (missing .catch() or try/catch at call sites)
            - browser.* API calls (tabs, scripting, storage, runtime) with no error handling
            - Functions that return null/undefined on failure without documenting that contract
            - Swift: Result/Error values that are ignored (guard let without else, optional chaining
              on errors, completion handlers that silently drop errors)
            - Any pattern where a failure becomes invisible to the caller

            Only flag issues introduced by this PR's diff. Skip pre-existing issues.
            Skip false positives — if error handling is clearly intentional (e.g. a best-effort
            keepalive alarm), say so and move on.

            If you find real issues, post a single top-level PR comment summarising them with
            file and line citations. If there are no issues, post nothing.

            Get the commit SHA with: gh pr view $PR_NUMBER --repo $PR_REPO --json headRefOid -q .headRefOid

  test-coverage:
    runs-on: ubuntu-latest
    env:
      PR_REPO: ${{ github.repository }}
      PR_NUMBER: ${{ github.event.pull_request.number }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: --allowedTools "Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh api:*)"
          prompt: |
            REPO: $PR_REPO
            PR NUMBER: $PR_NUMBER

            Review this PR's test coverage. Check whether non-trivial logic introduced
            by the diff has a corresponding test in Tests/JS/ or the Swift test targets.

            Focus on:
            - New tool handler files in tools/ — each should have a matching .test.js
            - New branches or error paths in existing tools — check if tests cover them
            - New Swift functions in the native app that involve non-trivial logic

            Do NOT flag missing tests for:
            - Simple config/manifest changes
            - Boilerplate registrations (registerTool calls, constants)
            - One-liner getters or pure delegation

            The test layout convention: JS tests live in Tests/JS/<source-file>.test.js.

            If you find gaps, post a single top-level PR comment describing what is untested
            and why it matters. If coverage looks adequate, post nothing.

            Get the commit SHA with: gh pr view $PR_NUMBER --repo $PR_REPO --json headRefOid -q .headRefOid
