name: Claude PR Review

on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write
  id-token: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          claude_args: --allowedTools "Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh api:*)"
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number }}

            Review this PR against the three areas defined in CLAUDE.md:

            1. Safari Extension Best Practices
               - Event listener lifecycle: Promises that register browser event listeners must
                 clean up on ALL exit paths (resolve, reject, timeout). Check for settled guards.
               - Cancellable promises: Promises owning external resources must expose .cancel()
                 and callers must invoke it when abandoning early.
               - browser.tabs.onRemoved: Navigation must listen for tab closure and reject
                 immediately rather than waiting for the 30s timeout.
               - BFCache: goBack()/goForward() may complete without a "loading" event in Safari.
                 Do not require "loading" before accepting "complete" for history navigations.
               - Manifest load order: background.scripts order in manifest.json must match
                 the load-order comment in background.js.

            2. STRUCTURE.md Compliance
               - Tool handlers: one file per MCP tool in tools/, named in kebab-case.
               - Tests: JS tests in Tests/JS/ named <source-file>.test.js.
               - Specs: one file per feature in Specs/, named NNN-description.md.
               - No new files outside the canonical layout without documented justification.

            3. DRY / SOLID
               - Tab resolution must use globalThis.resolveTab from tabs-manager.js.
               - Tool registration must use globalThis.registerTool from tool-registry.js.
               - Each tool file implements exactly one MCP tool.
               - Shared logic extracted only when genuinely used by 2+ tools.

            Flag only real issues. Skip style nits. For each finding, cite the specific
            file and line number and explain the impact.

            Use `gh pr comment --repo REPO -R REPO --body "..."` for a top-level review summary.

            For inline code comments, use the GitHub REST API via gh:
              gh api repos/REPO/pulls/PR_NUMBER/comments \
                -f commit_id=COMMIT_SHA \
                -f path="path/to/file.js" \
                -f line=42 \
                -f side=RIGHT \
                -f body="Your comment here"
            Get the commit SHA with: gh pr view PR_NUMBER --repo REPO --json headRefOid -q .headRefOid
