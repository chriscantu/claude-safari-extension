name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install JS dependencies
        run: npm ci

      - name: Run JS unit tests
        run: npm test

      - name: Validate injected scripts syntax
        run: node scripts/validate-injected-scripts.js

      - name: Build (Xcode)
        run: |
          set -o pipefail
          xcodebuild build \
            -project ClaudeInSafari.xcodeproj \
            -scheme ClaudeInSafari \
            -destination "platform=macOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
          | xcpretty

      - name: Run Swift tests
        run: |
          set -o pipefail
          xcodebuild test \
            -project ClaudeInSafari.xcodeproj \
            -scheme ClaudeInSafariTests \
            -destination "platform=macOS" \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
          | xcpretty
